let AC=null; function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function blip(f1,f2,dur,type,vol){ const a=ac(); if(!a)return; const o=a.createOscillator(),g=a.createGain(); o.type=type||'square'; o.frequency.setValueAtTime(f1,a.currentTime); o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),a.currentTime+dur); g.gain.setValueAtTime(vol||0.1,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur); o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur); }
function noise(dur,vol){ const a=ac(); if(!a)return; const b=a.createBuffer(1,a.sampleRate*dur,a.sampleRate); const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length); const s=a.createBufferSource(); s.buffer=b; const g=a.createGain(); g.gain.value=vol||0.18; s.connect(g); g.connect(a.destination); s.start(); }

// ---- level ----
const TILE=44;
let solid, COLS, ROWS, coins, enemies, goalX, goalY, startX, startY, levelW;
function genLevel(){
  COLS=210; ROWS=15; levelW=COLS*TILE;
  solid=[]; for(let y=0;y<ROWS;y++){ solid.push(new Array(COLS).fill(0)); }
  coins=[]; enemies=[];
  const groundTop=ROWS-2;
  let rng=12345; const rnd=()=>{ rng=(rng*1103515245+12345)&0x7fffffff; return rng/0x7fffffff; };
  // base ground with gaps
  let x=0;
  function fillGround(a,b){ for(let i=a;i<b;i++){ solid[groundTop][i]=1; solid[groundTop+1][i]=1; } }
  fillGround(0,10); // safe start
  x=10;
  while(x<COLS-12){
    let seg=4+Math.floor(rnd()*6);
    fillGround(x, Math.min(COLS-8,x+seg));
    // coins along segment
    if(rnd()<0.6){ for(let k=1;k<seg-1;k+=2){ coins.push({x:(x+k)*TILE+TILE/2, y:(groundTop-1)*TILE+TILE/2, got:false}); } }
    // enemy on segment
    if(seg>=5 && rnd()<0.65){ enemies.push(mkEnemy((x+Math.floor(seg/2))*TILE, (groundTop-1)*TILE)); }
    // floating platform with coins
    if(rnd()<0.55){ let py=groundTop-2-Math.floor(rnd()*2); let pw=2+Math.floor(rnd()*3); let pxs=x+1+Math.floor(rnd()*Math.max(1,seg-pw-1));
      for(let i=0;i<pw;i++){ if(pxs+i<COLS) solid[py][pxs+i]=2; coins.push({x:(pxs+i)*TILE+TILE/2,y:(py-1)*TILE+TILE/2,got:false}); } }
    x+=seg;
    // gap
    let gap=2+Math.floor(rnd()*2);
    // coin arc over gap
    for(let g=0;g<gap;g++){ coins.push({x:(x+g)*TILE+TILE/2, y:(groundTop-2-(g===Math.floor(gap/2)?1:0))*TILE+TILE/2, got:false}); }
    x+=gap;
  }
  fillGround(x,COLS); // safe end
  // goal: moon on a raised pillar near the end
  let gx=COLS-5;
  for(let y=groundTop-1;y>=groundTop-3;y--) solid[y][gx]=1;
  goalX=gx*TILE+TILE/2; goalY=(groundTop-4)*TILE;
  startX=2*TILE; startY=(groundTop-2)*TILE;
}
function mkEnemy(px,py){ return {x:px,y:py,w:TILE*0.8,h:TILE*0.8,vx:-90,dead:0,onG:true}; }
function solidAt(tx,ty){ if(tx<0||tx>=COLS||ty<0) return false; if(ty>=ROWS) return false; return solid[ty][tx]>0; }
function rectSolid(x,y,w,h){ const x0=Math.floor(x/TILE),x1=Math.floor((x+w-1)/TILE),y0=Math.floor(y/TILE),y1=Math.floor((y+h-1)/TILE);
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){ if(solidAt(tx,ty)) return true; } return false; }

  return c; }
async function flexX(){ const card=buildCard(); const txt=`I bagged $${score} in ${CFG.TOKEN} BULL RUN ${won?'and reached the moon 🌙':'📈'}\ncan you beat me? ${CFG.GAME_URL}`;
  try{ const blob=await new Promise(r=>card.toBlob(r,'image/png')); if(blob&&navigator.canShare){ const f=new File([blob],'bullrun.png',{type:'image/png'}); if(navigator.canShare({files:[f]})){ await navigator.share({files:[f],text:txt}); return; } } }catch(e){}
  try{ const a=document.createElement('a'); a.href=card.toDataURL('image/png'); a.download='bullrun.png'; a.click(); }catch(e){}
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank'); }
document.getElementById('flex').addEventListener('click',e=>{e.stopPropagation(); flexX();});

// ---- update ----
function update(dt){
  for(const p of parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=900*dt; } while(parts.length&&parts[0].life<=0) parts.shift();
  if(shake>0) shake=Math.max(0,shake-dt*40);
  if(P.squash>0) P.squash=Math.max(0,P.squash-dt*4);
  if(state!==ST.PLAY) return;
  if(P.inv>0)P.inv-=dt;

  // horizontal
  const want=(keys.r?1:0)-(keys.l?1:0);
  if(want!==0){ P.vx+=want*MOVE*dt; P.face=want; } else { if(P.vx>0){P.vx=Math.max(0,P.vx-FRIC*dt);} else {P.vx=Math.min(0,P.vx+FRIC*dt);} }
  P.vx=Math.max(-MAXRUN,Math.min(MAXRUN,P.vx));
  // jump (coyote + buffer)
  if(P.onG)P.coyote=0.1; else P.coyote-=dt;
  if(P.buf>0)P.buf-=dt;
  if(P.buf>0 && P.coyote>0){ P.vy=JUMP; P.onG=false; P.coyote=0; P.buf=0; P.squash=-0.6; sJump(); haptic('light');
    for(let i=0;i<5;i++) parts.push({x:P.x+P.w/2,y:P.y+P.h,vx:(Math.random()-.5)*120,vy:60+Math.random()*60,life:.3,c:'#16ff9b',s:2}); }
  if(!keys.j && P.vy<0) P.vy*=Math.pow(0.01,dt); // variable jump cut when released

  P.vy=Math.min(MAXFALL,P.vy+GRAV*dt);
  // substep movement so the player can never tunnel through a thin platform
  const wasAir=!P.onG;
  let n=Math.max(1,Math.min(10,Math.ceil(Math.max(Math.abs(P.vx*dt),Math.abs(P.vy*dt))/(TILE*0.30))));
  const sdt=dt/n; P.onG=false; let landed=false;
  for(let s=0;s<n;s++){
    P.x+=P.vx*sdt;
    if(rectSolid(P.x,P.y,P.w,P.h)){ if(P.vx>0){ P.x=Math.floor((P.x+P.w)/TILE)*TILE-P.w-0.01; } else if(P.vx<0){ P.x=(Math.floor(P.x/TILE)+1)*TILE+0.01; } P.vx=0; }
    P.y+=P.vy*sdt;
    if(rectSolid(P.x,P.y,P.w,P.h)){ if(P.vy>0){ P.y=Math.floor((P.y+P.h)/TILE)*TILE-P.h-0.01; P.onG=true; landed=true; } else if(P.vy<0){ P.y=(Math.floor(P.y/TILE)+1)*TILE+0.01; } P.vy=0; break; }
  }
  if(landed && wasAir){ P.squash=0.6; for(let i=0;i<5;i++) parts.push({x:P.x+P.w/2,y:P.y+P.h,vx:(Math.random()-.5)*140,vy:-20-Math.random()*40,life:.25,c:'#8aa0ad',s:2}); }
  if(P.onG && Math.abs(P.vx)<30){ lastSafeX=P.x; lastSafeY=P.y; }

  if(P.x<0)P.x=0;
  // fall in pit
  if(P.y>ROWS*TILE+80){ loseLife(); return; }

  // coins
  for(const c of coins){ if(c.got)continue; if(Math.abs(c.x-(P.x+P.w/2))<TILE*0.6 && Math.abs(c.y-(P.y+P.h/2))<TILE*0.7){ c.got=true; score++; sCoin(); for(let i=0;i<6;i++) parts.push({x:c.x,y:c.y,vx:(Math.random()-.5)*180,vy:(Math.random()-.5)*180,life:.4,c:'#ffcf4d',s:2}); } }

  // enemies
  for(const e of enemies){ if(e.dead){ e.dead-=dt; continue; }
    e.vy=(e.vy||0)+GRAV*dt; e.x+=e.vx*dt;
    if(rectSolid(e.x,e.y,e.w,e.h)){ if(e.vx>0)e.x=Math.floor((e.x+e.w)/TILE)*TILE-e.w-0.01; else e.x=(Math.floor(e.x/TILE)+1)*TILE+0.01; e.vx*=-1; }
    e.y+=e.vy*dt; if(rectSolid(e.x,e.y,e.w,e.h)){ if(e.vy>0){e.y=Math.floor((e.y+e.h)/TILE)*TILE-e.h-0.01;} e.vy=0; }
    // turn at ledge
    const ahead=Math.floor((e.x+(e.vx>0?e.w+2:-2))/TILE), below=Math.floor((e.y+e.h+4)/TILE);
    if(!solidAt(ahead,below)) e.vx*=-1;
    // collision with player
    if(P.inv<=0 && P.x+P.w>e.x+4 && P.x<e.x+e.w-4 && P.y+P.h>e.y+4 && P.y<e.y+e.h){
      if(P.vy>0 && P.y+P.h < e.y+e.h*0.6){ e.dead=0.3; P.vy=JUMP*0.6; score+=2; sStomp(); haptic('medium'); P.squash=-0.4;
        for(let i=0;i<10;i++) parts.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-.5)*260,vy:(Math.random()-.5)*200,life:.4,c:'#ff3b5c',s:2.5}); }
      else { loseLife(); return; }
    }
  }
  // goal
  if(Math.abs((P.x+P.w/2)-goalX)<TILE*0.7 && P.y< goalY+TILE*2){ win(); return; }

  // camera
  const tcam=Math.max(0,Math.min(levelW-W, P.x+P.w/2 - W*0.38));
  camX += (tcam-camX)*Math.min(1,dt*8);
}

// ---- draw ----
function drawMascot(px,py,w,h,face,sq){ ctx.save(); ctx.translate(px+w/2,py+h);
  const sx=face*(1-sq*0.25), sy=(1+sq*0.3); ctx.scale(sx,sy);
  const dw=w*1.5, dh=dw*(mascot.height/mascot.width); ctx.drawImage(mascot,-dw/2,-dh,dw,dh); ctx.restore(); }
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0f1f'); g.addColorStop(1,'#0a0712'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const shx=shake?(Math.random()-.5)*shake:0, shy=shake?(Math.random()-.5)*shake:0;
  ctx.save(); ctx.translate(shx,shy);
  for(const s of stars){ ctx.globalAlpha=s.z; ctx.fillStyle=s.c; const sxp=s.x-camX*0.2*s.z; const xx=((sxp%W)+W)%W; ctx.fillRect(xx,s.y,2*s.z+1,2*s.z+1);} ctx.globalAlpha=1;
  // moon goal glow (parallax far)
  const gsx=goalX-camX;
  ctx.save(); ctx.globalAlpha=0.9; ctx.shadowColor='#dfe9ff'; ctx.shadowBlur=40; ctx.fillStyle='#eef3ff'; ctx.beginPath(); ctx.arc(gsx, goalY-TILE*1.2, TILE*0.9,0,6.283); ctx.fill(); ctx.restore();
  // skyline parallax
  for(const b of skyline){ const bx=b.x-camX*0.5; if(bx+b.w<0||bx>W)continue; ctx.fillStyle='#0c1320'; ctx.fillRect(bx,H-b.h-TILE,b.w,b.h); ctx.fillStyle=b.c; ctx.globalAlpha=.5; ctx.fillRect(bx,H-b.h-TILE,b.w,3); ctx.globalAlpha=1; }
  // tiles
  const c0=Math.max(0,Math.floor(camX/TILE)), c1=Math.min(COLS-1,Math.floor((camX+W)/TILE));
  for(let ty=0;ty<ROWS;ty++) for(let tx=c0;tx<=c1;tx++){ const v=solid[ty][tx]; if(!v)continue; const X=tx*TILE-camX, Y=ty*TILE;
    const top=!solidAt(tx,ty-1); ctx.fillStyle=v===2?'#10202f':'#0e1a14'; ctx.fillRect(X,Y,TILE,TILE);
    ctx.strokeStyle=v===2?'#2f7bff':'#16ff9b'; ctx.globalAlpha=top?0.9:0.25; ctx.lineWidth=top?3:1; ctx.beginPath();
    if(top){ ctx.moveTo(X,Y+1.5); ctx.lineTo(X+TILE,Y+1.5);} else { ctx.strokeRect(X+.5,Y+.5,TILE-1,TILE-1);} ctx.stroke(); ctx.globalAlpha=1;
    if(top){ ctx.fillStyle='rgba(22,255,155,.08)'; ctx.fillRect(X,Y,TILE,6);} }
  // coins
  for(const c of coins){ if(c.got)continue; const X=c.x-camX; if(X<-20||X>W+20)continue; const yy=c.y+Math.sin(performance.now()/250+c.x)*3;
    ctx.save(); ctx.shadowColor='#ffcf4d'; ctx.shadowBlur=12; ctx.fillStyle='#ffcf4d'; ctx.beginPath(); ctx.ellipse(X,yy,9,11,0,0,6.283); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#7a5200'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',X,yy+1); ctx.restore(); }
  // goal flag pole
  ctx.strokeStyle='#16ff9b'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(gsx,goalY); ctx.lineTo(gsx,goalY+TILE*2); ctx.stroke();
  ctx.fillStyle='#16ff9b'; ctx.beginPath(); ctx.moveTo(gsx,goalY); ctx.lineTo(gsx+26,goalY+9); ctx.lineTo(gsx,goalY+18); ctx.fill();
  // enemies (bears)
  for(const e of enemies){ const X=e.x-camX; if(X<-40||X>W+40)continue; if(e.dead){ ctx.globalAlpha=Math.max(0,e.dead*3); }
    ctx.save(); ctx.translate(X+e.w/2, e.y+e.h/2); if(e.dead)ctx.scale(1,0.4);
    ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=10; ctx.fillStyle='#c4233f'; ctx.beginPath(); ctx.roundRect(-e.w/2,-e.h/2,e.w,e.h,8); ctx.fill();
    ctx.fillStyle='#7a0f20'; ctx.beginPath(); ctx.arc(-e.w*0.28,-e.h*0.42,5,0,6.283); ctx.arc(e.w*0.28,-e.h*0.42,5,0,6.283); ctx.fill(); // ears
    ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.fillRect(-e.w*0.22,-e.h*0.12,e.w*0.16,4); ctx.fillRect(e.w*0.06,-e.h*0.12,e.w*0.16,4); // angry eyes
    ctx.restore(); ctx.globalAlpha=1; }
  // player
  if(!(P.inv>0 && Math.floor(performance.now()/80)%2)) drawMascot(P.x,P.y,P.w,P.h,P.face,P.squash);
  // particles
  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life*2); ctx.fillStyle=p.c; ctx.fillRect(p.x-camX-p.s/2,p.y-p.s/2,p.s,p.s);} ctx.globalAlpha=1;
  ctx.restore();

  // HUD
  ctx.textAlign='left'; ctx.fillStyle='#ffcf4d'; ctx.font='bold 22px monospace'; ctx.fillText('$ '+score, 16, 34);
  ctx.textAlign='right'; ctx.fillStyle='#ff3b5c'; ctx.font='18px monospace'; let hh=''; for(let i=0;i<lives;i++)hh+='♥ '; ctx.fillText(hh.trim(), W-64, 32);
  // progress
  const prog=Math.max(0,Math.min(1,(P.x)/(goalX))); ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(16,46,W-150,4); ctx.fillStyle='#16ff9b'; ctx.fillRect(16,46,(W-150)*prog,4);

  if(state===ST.READY){ overlay(); ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 34px monospace'; ctx.shadowColor='#16ff9b'; ctx.shadowBlur=18; ctx.fillText('BULL RUN',W/2,H*0.28); ctx.shadowBlur=0;
    ctx.fillStyle='#16ff9b'; ctx.font='12px monospace'; ctx.fillText(CFG.TOKEN,W/2,H*0.28+24);
    ctx.fillStyle='#ffcf4d'; ctx.font='bold 13px monospace'; ctx.fillText('— HOW TO PLAY —',W/2,H*0.42);
    ctx.fillStyle='#cfe9da'; ctx.font='13px monospace';
    const L=['◀ ▶ move   ·   JUMP to jump','Stomp the bears 🐻 (+$2)','Grab every $','Reach the moon 🌙'];
    for(let i=0;i<L.length;i++) ctx.fillText(L[i],W/2,H*0.42+30+i*26);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.fillText('▶  TAP TO START',W/2,H*0.72); ctx.globalAlpha=1;
    if(best>0){ ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('BEST  $'+best,W/2,H*0.72+26);} }
  if(state===ST.DEAD){ overlay(); ctx.textAlign='center';
    ctx.fillStyle='#ff3b5c'; ctx.font='bold 34px monospace'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=16; ctx.fillText('REKT',W/2,H*0.34); ctx.shadowBlur=0;
    ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('BAGGED',W/2,H*0.42);
    ctx.fillStyle='#fff'; ctx.font='bold 56px monospace'; ctx.fillText('$'+score,W/2,H*0.50);
    ctx.fillStyle=score>=best&&score>0?'#16ff9b':'#5a7180'; ctx.font='bold 13px monospace'; ctx.fillText(score>=best&&score>0?'★ NEW BEST ★':('BEST  $'+best),W/2,H*0.55);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 15px monospace'; ctx.fillText('↻  TAP TO RETRY',W/2,H*0.63); ctx.globalAlpha=1; }
  if(state===ST.WIN){ overlay(); ctx.textAlign='center';
    ctx.fillStyle='#16ff9b'; ctx.font='bold 30px monospace'; ctx.shadowColor='#16ff9b'; ctx.shadowBlur=18; ctx.fillText('TO THE MOON 🌙',W/2,H*0.32); ctx.shadowBlur=0;
    ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('BAGGED',W/2,H*0.40);
    ctx.fillStyle='#fff'; ctx.font='bold 56px monospace'; ctx.fillText('$'+score,W/2,H*0.48);
    ctx.fillStyle=score>=best?'#16ff9b':'#5a7180'; ctx.font='bold 13px monospace'; ctx.fillText(score>=best?'★ NEW BEST ★':('BEST  $'+best),W/2,H*0.53);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 15px monospace'; ctx.fillText('↻  TAP TO PLAY AGAIN',W/2,H*0.61); ctx.globalAlpha=1; }
}
function overlay(){ ctx.fillStyle='rgba(5,6,12,0.74)'; ctx.fillRect(0,0,W,H); }
let last=performance.now();
function loop(now){ let dt=(now-last)/1000; last=now; if(dt>0.033)dt=0.033; update(dt); draw(); requestAnimationFrame(loop); }
function boot(){ document.getElementById('load').style.display='none'; genLevel(); P.x=startX;P.y=startY; initBg(); last=performance.now(); requestAnimationFrame(loop); }
if(!CanvasRenderingContext2D.prototype.roundRect){ CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){ this.beginPath(); this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r); this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r); this.closePath(); return this; }; }
</script>
