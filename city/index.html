// ---------- world ----------
const P=330, DSIZE=260, Z=0.72;
const BUILD=['bSq','bL','bWide'];
function rnd(i,j){ let h=(i*374761393+j*668265263)^0x9e3779b9; h=Math.imul(h^(h>>>13),1274126177); return ((h^(h>>>16))>>>0)/4294967295; }
const bcache={};
function building(i,j){
  const key=i+'_'+j; if(key in bcache) return bcache[key];
  let b=null; const r=rnd(i,j);
  if(Math.abs(i)<=1 && Math.abs(j)<=1){ bcache[key]=null; return null; } // keep spawn area clear
  if(r>=0.20){ const sp=BUILD[Math.floor(rnd(i+5,j+7)*3)]; const rot=Math.floor(rnd(i+9,j+3)*4)*Math.PI/2;
    const im=IMG[sp]; const s=DSIZE/Math.max(im.width,im.height); let dw=im.width*s, dh=im.height*s;
    let hw=dw, hh=dh; if(rot===Math.PI/2||rot===3*Math.PI/2){ [hw,hh]=[hh,hw]; }
    b={sp,rot,cx:i*P,cy:j*P,dw,dh,hw:hw*0.43,hh:hh*0.43};
  }
  bcache[key]=b; return b;
}

const SPAWN={x:P/2, y:P/2};   // road intersection between blocks
const car={x:SPAWN.x,y:SPAWN.y,a:0,speed:0,maxF:240,R:22};
const drifts=[], sparks=[], police=[], popups=[];
let score=0, best=0, combo=1, comboT=0, boost=1, boosting=false;
let wanted=0, heat=0, cooling=false, shake=0, camX=0, camY=0, flashOver=0;
const collected=new Set();
try{ best=parseInt(localStorage.getItem('finnputercity_best')||'0',10)||0; }catch(e){}

function reset(){
  car.x=SPAWN.x;car.y=SPAWN.y;car.a=0;car.speed=0;
  drifts.length=0;sparks.length=0;police.length=0;popups.length=0;collected.clear();
  score=0;combo=1;comboT=0;boost=1;boosting=false;wanted=0;heat=0;cooling=false;shake=0;camX=0;camY=0;
  state=ST.PLAY; startMusic();
}
function gameOver(){
  state=ST.OVER; shake=18; flashOver=1;
  if(score>best){ best=score; try{ localStorage.setItem('finnputercity_best',String(best)); }catch(e){} }
  for(let p=0;p<26;p++) sparks.push({x:car.x,y:car.y,vx:(Math.random()-.5)*420,vy:(Math.random()-.5)*420,life:.8,c:Math.random()<.5?'#ff3b5c':'#2f7bff',s:3});
}

// ---------- input ----------
const keys={};
let steerAxis=0, gasAxis=0, joy=null; const JR=62;
addEventListener('keydown',e=>{keys[e.key]=true; if(e.key.startsWith('Arrow')||e.key===' ')e.preventDefault(); if(e.key==='Shift')boosting=true;});
addEventListener('keyup',e=>{keys[e.key]=false; if(e.key==='Shift')boosting=false;});
function tap(){ if(state!==ST.PLAY) reset(); }
function updateJoy(){ if(!joy){steerAxis=0;gasAxis=0;return;} let dx=joy.kx-joy.bx,dy=joy.ky-joy.by,d=Math.hypot(dx,dy); if(d>JR){dx*=JR/d;dy*=JR/d;} steerAxis=dx/JR; gasAxis=-dy/JR; }
cv.addEventListener('touchstart',e=>{ if(state!==ST.PLAY){ tap(); if(e.cancelable)e.preventDefault(); return; }
  for(const t of e.changedTouches){ if(!joy) joy={id:t.identifier,bx:t.clientX,by:t.clientY,kx:t.clientX,ky:t.clientY}; }
  if(e.cancelable)e.preventDefault(); },{passive:false});
cv.addEventListener('touchmove',e=>{ if(joy) for(const t of e.changedTouches){ if(t.identifier===joy.id){joy.kx=t.clientX;joy.ky=t.clientY;} } if(e.cancelable)e.preventDefault(); },{passive:false});
cv.addEventListener('touchend',e=>{ if(joy) for(const t of e.changedTouches){ if(t.identifier===joy.id) joy=null; } },{passive:false});
cv.addEventListener('touchcancel',()=>{ joy=null; },{passive:false});
cv.addEventListener('mousedown',e=>{ if(state!==ST.PLAY){tap();return;} joy={id:'m',bx:e.clientX,by:e.clientY,kx:e.clientX,ky:e.clientY}; });
addEventListener('mousemove',e=>{ if(joy&&joy.id==='m'){joy.kx=e.clientX;joy.ky=e.clientY;} });
addEventListener('mouseup',()=>{ if(joy&&joy.id==='m') joy=null; });
const bb=document.getElementById('boost');
function bOn(e){ boosting=true; e.stopPropagation(); if(e.cancelable)e.preventDefault(); }
function bOff(e){ boosting=false; e.stopPropagation(); }
bb.addEventListener('touchstart',bOn,{passive:false}); bb.addEventListener('touchend',bOff,{passive:false});
bb.addEventListener('mousedown',bOn); bb.addEventListener('mouseup',bOff);

// ---------- collision ----------
function resolve(o){
  const ci=Math.round(o.x/P), cj=Math.round(o.y/P); let hit=0;
  for(let i=ci-1;i<=ci+1;i++) for(let j=cj-1;j<=cj+1;j++){ const b=building(i,j); if(!b) continue;
    const nx=Math.max(b.cx-b.hw,Math.min(o.x,b.cx+b.hw)), ny=Math.max(b.cy-b.hh,Math.min(o.y,b.cy+b.hh));
    let dx=o.x-nx, dy=o.y-ny, d2=dx*dx+dy*dy;
    if(d2<o.R*o.R){ const d=Math.sqrt(d2)||0.001, push=o.R-d; o.x+=dx/d*push; o.y+=dy/d*push; hit=Math.max(hit,push); } }
  return hit;
}
function moveEnt(o,fx,fy,dist){ // substep to prevent tunneling
  const steps=Math.max(1,Math.ceil(Math.abs(dist)/10)); let hit=0;
  for(let s=0;s<steps;s++){ o.x+=fx*dist/steps; o.y+=fy*dist/steps; hit=Math.max(hit,resolve(o)); }
  return hit;
}

function spawnPolice(){
  const ang=Math.random()*6.283, dist=Math.max(W,H)/Z*0.55;
  police.push({x:car.x+Math.cos(ang)*dist, y:car.y+Math.sin(ang)*dist, a:0, speed:0, maxF:225+wanted*14, R:21});
}
function addPop(x,y,txt,c){ popups.push({x,y,txt,c,life:.9}); }

let last=performance.now();
function update(dt){
  for(const p of sparks){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; } while(sparks.length&&sparks[0].life<=0) sparks.shift();
  for(const u of popups){ u.life-=dt; u.y-=34*dt; } while(popups.length&&popups[0].life<=0) popups.shift();
  for(const d of drifts) d.a-=dt*0.2;
  if(shake>0) shake=Math.max(0,shake-dt*45);
  if(flashOver>0) flashOver=Math.max(0,flashOver-dt*1.5);
  camX+=(car.x-camX)*Math.min(1,dt*5); camY+=(car.y-camY)*Math.min(1,dt*5);
  if(state!==ST.PLAY) return;

  updateJoy();
  const kSteer=(keys['ArrowLeft']?-1:0)+(keys['ArrowRight']?1:0);
  const steer = kSteer!==0 ? kSteer : steerAxis;
  const kGas = keys['ArrowUp']||keys[' '];
  const gasAmt = kGas?1:Math.max(0,gasAxis);
  const brake = keys['ArrowDown'] || gasAxis<-0.45;
  // nitro
  const wantBoost=boosting && boost>0.02;
  if(wantBoost){ boost=Math.max(0,boost-dt*0.55); } else { boost=Math.min(1,boost+dt*0.20); }
  const mF=car.maxF*(wantBoost?1.85:1), cruise=car.maxF*0.5;
  let target = brake? -90 : cruise + (mF-cruise)*((kGas||gasAmt>0.12)?Math.max(0.55,gasAmt):0);
  car.speed += (target-car.speed)*Math.min(1,dt*(wantBoost?3.2:2.4));
  const sf=Math.abs(car.speed)/car.maxF;
  car.a += steer*2.5*dt*(0.35+Math.min(1,sf)*0.65)*Math.sign(car.speed||1);
  const fx=Math.sin(car.a), fy=-Math.cos(car.a);
  const hit=moveEnt(car,fx,fy,car.speed*dt);
  if(hit>2){ car.speed*=0.35; if(hit>5)shake=Math.max(shake,8); }

  if(Math.abs(steer)>0 && sf>0.45){ drifts.push({x:car.x-fx*11,y:car.y-fy*11,a:0.5}); if(drifts.length>220)drifts.shift(); }
  if(Math.random()<sf){ const bc=wantBoost?'#ff8a00':'#16ff9b'; sparks.push({x:car.x-fx*22,y:car.y-fy*22,vx:-fx*40+(Math.random()-.5)*30,vy:-fy*40+(Math.random()-.5)*30,life:.4,c:bc,s:wantBoost?3:2}); }

  // combo timer
  if(comboT>0){ comboT-=dt; if(comboT<=0) combo=1; }

  // coins
  const gx=Math.round(car.x/95), gy=Math.round(car.y/95);
  for(let i=gx-3;i<=gx+3;i++) for(let j=gy-3;j<=gy+3;j++){
    if(rnd(i*2+1,j*2+1)<0.42 && !collected.has(i+'c'+j)){
      const cx=i*95, cy=j*95, dx=cx-car.x, dy=cy-car.y;
      if(dx*dx+dy*dy<900){ collected.add(i+'c'+j);
        if(comboT>0) combo=Math.min(8,combo+1); else combo=1; comboT=2.4;
        const gain=combo; score+=gain; heat+=0.05;
        addPop(cx,cy,(combo>1?('+'+gain+'  x'+combo):'+1'), combo>3?'#ff3b5c':(combo>1?'#ffcf4d':'#16ff9b'));
        for(let p=0;p<8;p++) sparks.push({x:cx,y:cy,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200,life:.45,c:'#ffcf4d',s:2.5}); }
    }
  }

  // WANTED = heat meter. Fast driving fills it, slowing empties it. Cops scale with it.
  const fast = sf>0.5;
  if(fast) heat=Math.min(1, heat+dt*0.10); else heat=Math.max(0, heat-dt*0.30);
  cooling = (!fast && heat>0.02);
  wanted = Math.min(5, Math.floor(heat*5));
  if(police.length<wanted && Math.random()<dt*1.8) spawnPolice();
  while(police.length>wanted) police.pop();

  for(const pc of police){
    pc.maxF=225+wanted*14;
    const want=Math.atan2(car.x-pc.x, -(car.y-pc.y));
    let da=((want-pc.a+Math.PI*3)%(Math.PI*2))-Math.PI; pc.a+=Math.max(-2.7*dt,Math.min(2.7*dt,da));
    pc.speed+=(pc.maxF-pc.speed)*Math.min(1,dt*2);
    const pfx=Math.sin(pc.a), pfy=-Math.cos(pc.a); moveEnt(pc,pfx,pfy,pc.speed*dt);
    const dx=pc.x-car.x, dy=pc.y-car.y;
    if(dx*dx+dy*dy<(car.R+pc.R)*(car.R+pc.R)) gameOver();
  }
}

// ---------- draw ----------
function drawCar(im,x,y,a,len){ const w=len*(im.width/im.height); ctx.save(); ctx.translate(x,y); ctx.rotate(a); ctx.drawImage(im,-w/2,-len/2,w,len); ctx.restore(); }
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.fillStyle='#080a10'; ctx.fillRect(0,0,W,H);
  const sx=(shake?(Math.random()-.5)*shake:0), sy=(shake?(Math.random()-.5)*shake:0);
  ctx.save(); ctx.translate(W/2+sx, H/2+sy); ctx.scale(Z,Z); ctx.translate(-camX,-camY);
  const HW=(W/2)/Z+DSIZE, HH=(H/2)/Z+DSIZE;
  const x0=camX-HW, x1=camX+HW, y0=camY-HH, y1=camY+HH;
  ctx.fillStyle='#0b0e16';
  const ci0=Math.floor(x0/P)-1, ci1=Math.ceil(x1/P)+1, cj0=Math.floor(y0/P)-1, cj1=Math.ceil(y1/P)+1;
  for(let i=ci0;i<=ci1;i++) ctx.fillRect(i*P-P/2,y0,P,y1-y0);
  for(let j=cj0;j<=cj1;j++) ctx.fillRect(x0,j*P-P/2,x1-x0,P);
  ctx.strokeStyle='rgba(22,255,155,0.09)'; ctx.lineWidth=2; ctx.setLineDash([16,20]);
  for(let i=ci0;i<=ci1;i++){ ctx.beginPath(); ctx.moveTo(i*P,y0); ctx.lineTo(i*P,y1); ctx.stroke(); }
  for(let j=cj0;j<=cj1;j++){ ctx.beginPath(); ctx.moveTo(x0,j*P); ctx.lineTo(x1,j*P); ctx.stroke(); }
  ctx.setLineDash([]);
  for(const d of drifts){ if(d.a<=0)continue; ctx.globalAlpha=d.a*0.4; ctx.fillStyle='#05070b'; ctx.fillRect(d.x-2,d.y-2,4,4); } ctx.globalAlpha=1;
  const t=performance.now()/300, cim=IMG.coin;
  for(let i=Math.floor(x0/95);i<=Math.ceil(x1/95);i++) for(let j=Math.floor(y0/95);j<=Math.ceil(y1/95);j++){
    if(rnd(i*2+1,j*2+1)<0.42 && !collected.has(i+'c'+j)){ const cx=i*95, cy=j*95, sc=Math.abs(Math.cos(t+i+j)); const w=22*Math.max(0.25,sc); ctx.drawImage(cim, cx-w/2, cy-11, w, 22); }
  }
  for(let i=ci0;i<=ci1;i++) for(let j=cj0;j<=cj1;j++){ const b=building(i,j); if(!b)continue;
    ctx.save(); ctx.translate(b.cx,b.cy); ctx.rotate(b.rot); ctx.drawImage(IMG[b.sp], -b.dw/2,-b.dh/2, b.dw,b.dh); ctx.restore(); }
  for(const s of sparks){ ctx.globalAlpha=Math.max(0,s.life*2.5); ctx.fillStyle=s.c; ctx.fillRect(s.x-s.s/2,s.y-s.s/2,s.s,s.s); } ctx.globalAlpha=1;
  for(const u of popups){ ctx.globalAlpha=Math.max(0,u.life); ctx.fillStyle=u.c; ctx.font='bold 18px monospace'; ctx.textAlign='center'; ctx.fillText(u.txt,u.x,u.y); } ctx.globalAlpha=1;
  for(const pc of police){ drawCar(IMG.police,pc.x,pc.y,pc.a,58);
    ctx.globalAlpha=0.5+0.5*Math.sin(performance.now()/80); ctx.fillStyle=(Math.floor(performance.now()/180)%2)?'#2f7bff':'#ff3b5c';
    ctx.beginPath(); ctx.arc(pc.x,pc.y,15,0,6.283); ctx.fill(); ctx.globalAlpha=1; }
  const fx=Math.sin(car.a), fy=-Math.cos(car.a);
  const hl=ctx.createRadialGradient(car.x+fx*40,car.y+fy*40,0,car.x+fx*40,car.y+fy*40,70);
  hl.addColorStop(0,'rgba(220,240,255,0.18)'); hl.addColorStop(1,'rgba(220,240,255,0)');
  ctx.fillStyle=hl; ctx.beginPath(); ctx.arc(car.x+fx*40,car.y+fy*40,70,0,6.283); ctx.fill();
  if(boosting && boost>0.02 && state===ST.PLAY){ ctx.fillStyle='#ff8a00'; ctx.globalAlpha=.8;
    ctx.beginPath(); ctx.moveTo(car.x-fx*26-fy*7,car.y-fy*26+fx*7); ctx.lineTo(car.x-fx*26+fy*7,car.y-fy*26-fx*7); ctx.lineTo(car.x-fx*(40+Math.random()*14),car.y-fy*(40+Math.random()*14)); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; }
  if(state!==ST.OVER || Math.floor(performance.now()/120)%2) drawCar(IMG.car,car.x,car.y,car.a,60);
  ctx.restore();

  // ---- screen-space UI ----
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.42,W/2,H/2,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.5)'); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#ffcf4d'; ctx.font='bold 22px monospace'; ctx.shadowColor='rgba(255,207,77,.6)'; ctx.shadowBlur=10;
  ctx.fillText('$ '+score, 16, 38); ctx.shadowBlur=0;
  if(combo>1){ ctx.fillStyle='#ff3b5c'; ctx.font='bold 16px monospace'; ctx.fillText('COMBO x'+combo, 16, 60); }
  { const wy=combo>1?74:54; ctx.textAlign='left';
    ctx.fillStyle='#5a7180'; ctx.font='10px monospace'; ctx.fillText('WANTED',16,wy);
    const bx2=16,by2=wy+5,bw2=128;
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(bx2,by2,bw2,9);
    const hc = heat<0.5?'#16ff9b':heat<0.8?'#ffcf4d':'#ff3b5c'; ctx.fillStyle=hc; ctx.fillRect(bx2,by2,bw2*heat,9);
    ctx.strokeStyle='rgba(0,0,0,.45)'; ctx.lineWidth=1; for(let n=1;n<5;n++){ ctx.beginPath(); ctx.moveTo(bx2+bw2*n/5,by2); ctx.lineTo(bx2+bw2*n/5,by2+9); ctx.stroke(); }
    ctx.font='bold 11px monospace';
    if(cooling){ ctx.fillStyle='#16ff9b'; ctx.fillText('COOLING DOWN',bx2+bw2+8,by2+9); }
    else if(wanted>0){ ctx.fillStyle='#ff3b5c'; ctx.fillText(wanted+' COP'+(wanted>1?'S':''),bx2+bw2+8,by2+9); } }
  // boost bar
  const bw=120; ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(W-bw-16,18,bw,8);
  ctx.fillStyle='#16ff9b'; ctx.fillRect(W-bw-16,18,bw*boost,8);
  ctx.fillStyle='#16ff9b'; ctx.font='10px monospace'; ctx.textAlign='right'; ctx.fillText('NITRO',W-16,16);
  ctx.fillStyle='#16ff9b'; ctx.textAlign='right'; ctx.font='11px monospace'; ctx.fillText('FINNPUTER CITY',W-16,H-14);
  if(joy && state===ST.PLAY){ let dx=joy.kx-joy.bx,dy=joy.ky-joy.by,d=Math.hypot(dx,dy); if(d>JR){dx*=JR/d;dy*=JR/d;}
    ctx.globalAlpha=.85; ctx.strokeStyle='rgba(22,255,155,.45)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(joy.bx,joy.by,JR,0,6.283); ctx.stroke();
    ctx.fillStyle='rgba(22,255,155,.30)'; ctx.beginPath(); ctx.arc(joy.bx+dx,joy.by+dy,26,0,6.283); ctx.fill();
    ctx.strokeStyle='#16ff9b'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(joy.bx+dx,joy.by+dy,26,0,6.283); ctx.stroke(); ctx.globalAlpha=1; }

  if(state===ST.READY){ overlay(); ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.font='bold 30px monospace'; ctx.shadowColor='#16ff9b'; ctx.shadowBlur=18; ctx.fillText('FINNPUTER CITY',W/2,H*0.24); ctx.shadowBlur=0;
    ctx.fillStyle='#16ff9b'; ctx.font='12px monospace'; ctx.fillText('$FINNPUTER',W/2,H*0.24+24);
    ctx.fillStyle='#ffcf4d'; ctx.font='bold 13px monospace'; ctx.fillText('— HOW TO PLAY —',W/2,H*0.40);
    ctx.fillStyle='#cfe9da'; ctx.font='13px monospace';
    const L=['Joystick (bottom-left) = steer + gas','NITRO button (right) = boost','Grab $ \u2014 fast = combo xN','Slow down to lose the cops \u00b7 caught = BUSTED'];
    for(let i=0;i<L.length;i++) ctx.fillText(L[i],W/2,H*0.40+30+i*26);
    ctx.fillStyle='#5a7180'; ctx.font='11px monospace'; ctx.fillText('Desktop: \u2190 \u2192 steer \u00b7 \u2191 gas \u00b7 Shift nitro',W/2,H*0.40+30+L.length*26+8);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.fillText('\u25b6  TAP TO DRIVE',W/2,H*0.82); ctx.globalAlpha=1;
    if(best>0){ ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('BEST  $'+best,W/2,H*0.82+24); }
  }
  if(state===ST.OVER){ overlay(); if(flashOver>0){ ctx.fillStyle='rgba(255,59,92,'+(flashOver*0.4)+')'; ctx.fillRect(0,0,W,H); }
    ctx.textAlign='center'; ctx.fillStyle='#ff3b5c'; ctx.font='bold 40px monospace'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=16; ctx.fillText('BUSTED',W/2,H*0.36); ctx.shadowBlur=0;
    ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('YOU COLLECTED',W/2,H*0.44);
    ctx.fillStyle='#ffcf4d'; ctx.font='bold 46px monospace'; ctx.fillText('$'+score,W/2,H*0.51);
    const nb=score>=best&&score>0; ctx.fillStyle=nb?'#16ff9b':'#5a7180'; ctx.font='bold 13px monospace'; ctx.fillText(nb?'★ NEW HIGH SCORE ★':('BEST  $'+best),W/2,H*0.55);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 15px monospace'; ctx.fillText('↻  TAP TO RETRY',W/2,H*0.66); ctx.globalAlpha=1;
  }
}
function overlay(){ ctx.fillStyle='rgba(5,6,12,0.74)'; ctx.fillRect(0,0,W,H); }

function loop(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05; update(dt); draw(); requestAnimationFrame(loop); }
function boot(){ document.getElementById('load').style.display='none'; last=performance.now(); requestAnimationFrame(loop); }
</script>
</body>
</html>
