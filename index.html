<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{min-height:100vh;background:radial-gradient(120% 80% at 50% 0%, #0d1430 0%, #05060c 60%);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;color:#cfe9da;
    display:flex;flex-direction:column;align-items:center;padding:18px 16px 60px;}
  .hero{width:100%;max-width:480px;border-radius:16px;overflow:hidden;border:1px solid rgba(22,255,155,.25);
    box-shadow:0 0 30px rgba(22,255,155,.18);margin-bottom:22px;}
  .hero img{width:100%;display:block;}
  .grid{display:flex;flex-direction:column;gap:16px;width:100%;max-width:480px;}
  .card{display:block;text-decoration:none;border-radius:16px;overflow:hidden;border:1px solid rgba(22,255,155,.22);
    background:#0b0e16;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .15s;}
  .card:active{transform:scale(.985);}
  .card .art{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0b0e16;}
  .card .body{padding:13px 15px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .card .name{font-size:16px;font-weight:bold;color:#fff;letter-spacing:.5px;}
  .card .sub{font-size:11px;color:#8aa0ad;margin-top:3px;}
  .play{flex:none;padding:9px 18px;border-radius:24px;background:linear-gradient(135deg,#16ff9b,#0bbf73);
    color:#06281b;font-weight:bold;font-size:13px;letter-spacing:1px;}
  footer{margin-top:30px;color:#3f5566;font-size:11px;letter-spacing:1px;text-align:center;}
  footer b{color:#16ff9b;}
