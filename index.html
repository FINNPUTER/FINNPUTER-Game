<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05060c">
<title>FINNPUTER ARCADE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{min-height:100vh;background:radial-gradient(120% 80% at 50% 0%, #0d1430 0%, #05060c 60%);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,monospace;color:#cfe9da;
    display:flex;flex-direction:column;align-items:center;padding:32px 18px 60px;}
  .mascot{width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(22,255,155,.5));margin-bottom:10px;}
  h1{font-size:clamp(26px,7vw,40px);letter-spacing:2px;text-align:center;color:#fff;text-shadow:0 0 18px rgba(22,255,155,.6);}
  .tag{color:#16ff9b;font-size:12px;letter-spacing:3px;margin-top:6px;margin-bottom:28px;}
  .grid{display:flex;flex-direction:column;gap:18px;width:100%;max-width:440px;}
  .card{display:block;text-decoration:none;border-radius:16px;overflow:hidden;border:1px solid rgba(22,255,155,.25);
    background:#0b0e16;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .15s,box-shadow .15s;}
  .card:active{transform:scale(.98);}
  .card .art{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#0b0e16;}
  .card .body{padding:14px 16px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .card .name{font-size:17px;font-weight:bold;color:#fff;letter-spacing:1px;}
  .card .sub{font-size:11px;color:#8aa0ad;margin-top:3px;}
  .play{flex:none;padding:9px 18px;border-radius:24px;background:linear-gradient(135deg,#16ff9b,#0bbf73);
    color:#06281b;font-weight:bold;font-size:13px;letter-spacing:1px;}
  .blaster .art{display:flex;align-items:center;justify-content:center;background:
    radial-gradient(80% 120% at 50% 0%,#16223f,#070a14);color:#16ff9b;font-size:13px;letter-spacing:3px;}
  footer{margin-top:34px;color:#3f5566;font-size:11px;letter-spacing:1px;text-align:center;}
  footer b{color:#16ff9b;}
</style>
</head>
