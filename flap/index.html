// ---- audio (procedural) ----
let AC=null; function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function blip(f1,f2,dur,type,vol){ const a=ac(); if(!a)return; const o=a.createOscillator(),g=a.createGain(); o.type=type||'square'; o.frequency.setValueAtTime(f1,a.currentTime); o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),a.currentTime+dur); g.gain.setValueAtTime(vol||0.12,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur); o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur); }
function noise(dur,vol){ const a=ac(); if(!a)return; const b=a.createBuffer(1,a.sampleRate*dur,a.sampleRate); const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length); const s=a.createBufferSource(); s.buffer=b; const g=a.createGain(); g.gain.value=vol||0.2; s.connect(g); g.connect(a.destination); s.start(); }
const sFlap=()=>blip(680,360,0.10,'square',0.10);
const sCoin=()=>{blip(880,1320,0.09,'triangle',0.12); setTimeout(()=>blip(1320,1760,0.08,'triangle',0.10),60);};
const sCrash=()=>{noise(0.3,0.25); blip(200,60,0.4,'sawtooth',0.18);};

// ---- state ----
const ST={READY:0,PLAY:1,OVER:2}; let state=ST.READY;
let mx=0,my=0,vy=0,tilt=0, score=0, combo=1, scrollX=0, shake=0, hitstop=0, flap=0;
const pipes=[], parts=[], stars=[], skyline=[], trail=[];
const GRAV=2100, FLAP=-560, SPEED0=235, PIPEW=74;
function gap(){ return Math.max(150, Math.min(300, H*0.28) - score*3.2); }
function speed(){ return SPEED0 + Math.min(235, score*5); }
let spawnX=0;

function initBg(){ stars.length=0; for(let i=0;i<90;i++) stars.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*0.8+0.2,c:Math.random()<0.15?'#16ff9b':'#ffffff'});
  skyline.length=0; let x=0; while(x<W+200){ const w=40+Math.random()*70,h=60+Math.random()*150; skyline.push({x,w,h,c:['#ff3b5c','#2f7bff','#16ff9b'][Math.floor(Math.random()*3)]}); x+=w+8; } }
function reset(){ mx=W*0.30; my=H*0.45; vy=0; tilt=0; score=0; combo=1; scrollX=0; shake=0; hitstop=0;
  pipes.length=0; parts.length=0; trail.length=0; spawnX=W+120; state=ST.PLAY; addPipe(spawnX); document.getElementById('flex').style.display='none'; }
function over(){ state=ST.OVER; shake=16; hitstop=0.12; sCrash(); haptic('heavy'); if(score>best){best=score; saveBest();}
  document.getElementById('flex').style.display='block';
  for(let i=0;i<22;i++) parts.push({x:mx,y:my,vx:(Math.random()-.5)*420,vy:(Math.random()-.5)*420,life:.8,c:Math.random()<.5?'#ff3b5c':'#16ff9b',s:3}); }

function addPipe(x){ const g=gap(); const cy=H*0.18 + Math.random()*(H*0.64-g); pipes.push({x, top:cy, bot:cy+g, scored:false, coin:true, cy:cy+g/2}); }

function flapNow(){ if(state===ST.READY){ reset(); } else if(state===ST.OVER){ if(Date.now()-overAt>350) reset(); return; }
  vy=FLAP; flap=1; sFlap(); haptic('light');
  for(let i=0;i<6;i++) parts.push({x:mx-14,y:my+10,vx:-120-Math.random()*80,vy:40+Math.random()*60,life:.35,c:'#16ff9b',s:2}); }
let overAt=0;
function tap(e){ if(state===ST.OVER&&overAt===0)overAt=Date.now(); if(!AC)ac(); startMusic(); flapNow(); if(e&&e.cancelable)e.preventDefault(); }
cv.addEventListener('touchstart',tap,{passive:false});
cv.addEventListener('mousedown',tap);
addEventListener('keydown',e=>{ if(e.key===' '||e.key==='ArrowUp'){ tap(e); } });
function stamp(){ if(state===ST.PLAY)return; overAt=Date.now(); }

// ---- share card ----
function buildCard(){ const c=document.createElement('canvas'); c.width=1080;c.height=1350; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,1350); g.addColorStop(0,'#0a0618'); g.addColorStop(1,'#05030f'); x.fillStyle=g; x.fillRect(0,0,1080,1350);
  for(let i=0;i<160;i++){ x.globalAlpha=Math.random()*0.7+0.2; x.fillStyle=Math.random()<0.15?'#16ff9b':'#fff'; const s=Math.random()*3+1; x.fillRect(Math.random()*1080,Math.random()*1350,s,s); } x.globalAlpha=1;
  const mw=420,mh=mw*mascot.height/mascot.width; x.drawImage(mascot,540-mw/2,300-mh/2,mw,mh);
  x.textAlign='center'; x.fillStyle='#16ff9b'; x.font='bold 40px monospace'; x.fillText(CFG.TOKEN+'  ·  CANDLE FLAP',540,150);
  x.fillStyle='#5a7180'; x.font='30px monospace'; x.fillText('SCORE',540,640);
  x.fillStyle='#eafff5'; x.font='bold 170px monospace'; x.fillText(String(score),540,800);
  x.strokeStyle='#16ff9b'; x.lineWidth=3; x.beginPath(); x.moveTo(216,900); x.lineTo(864,900); x.stroke();
  x.fillStyle='#eafff5'; x.font='bold 46px monospace'; x.fillText("don't get liquidated.",540,1000);
  x.fillStyle='#3f5566'; x.font='28px monospace'; x.fillText('@'+CFG.X_HANDLE+'   ·   '+CFG.GAME_URL.replace(/^https?:\/\//,''),540,1280);
  return c; }
async function flexX(){ const card=buildCard(); const txt=`I scored ${score} in ${CFG.TOKEN} Candle Flap 📈\ncan you beat me? ${CFG.GAME_URL}`;
  try{ const blob=await new Promise(r=>card.toBlob(r,'image/png')); if(blob&&navigator.canShare){ const f=new File([blob],'candleflap.png',{type:'image/png'}); if(navigator.canShare({files:[f]})){ await navigator.share({files:[f],text:txt}); return; } } }catch(e){}
  try{ const a=document.createElement('a'); a.href=card.toDataURL('image/png'); a.download='candleflap.png'; a.click(); }catch(e){}
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank'); }
document.getElementById('flex').addEventListener('click',e=>{e.stopPropagation(); flexX();});
document.getElementById('mute').addEventListener('click',e=>{e.stopPropagation(); musicOn=!musicOn; e.currentTarget.textContent=musicOn?'\uD83D\uDD0A':'\uD83D\uDD08'; if(bgm){ if(musicOn) bgm.play().catch(()=>{}); else bgm.pause(); } });

// ---- loop ----
let last=performance.now();
function update(dt){
  for(const p of parts){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=600*dt; } while(parts.length&&parts[0].life<=0) parts.shift();
  if(shake>0) shake=Math.max(0,shake-dt*40);
  if(flap>0) flap=Math.max(0,flap-dt*4);
  for(const s of stars){ s.x-=s.z*30*dt*(state===ST.PLAY?2:1); if(s.x<0){s.x=W;s.y=Math.random()*H;} }
  if(state===ST.PLAY){ for(const b of skyline){ b.x-=speed()*0.25*dt; } let minx=Math.min(...skyline.map(b=>b.x)); for(const b of skyline){ if(b.x+b.w<0){ b.x=minx+ Math.random()*40+40; minx=b.x; b.h=60+Math.random()*150; } } }
  if(state!==ST.PLAY) return;

  vy+=GRAV*dt; my+=vy*dt; tilt += ((Math.max(-0.5,Math.min(1.1, vy/900)))-tilt)*Math.min(1,dt*10);
  const tsp=speed(); trail.push({x:mx-18,y:my+6,life:.30}); if(trail.length>16)trail.shift(); for(const t of trail){ t.x-=tsp*dt; t.life-=dt; }

  const sp=speed();
  for(const p of pipes){ p.x-=sp*dt;
    if(!p.scored && p.x+PIPEW<mx){ p.scored=true; score++; if(!p.coinTaken){ combo=1; } document.getElementById; }
    if(p.coin){ const dx=p.cy?0:0; const cdx=(p.x+PIPEW/2)-mx, cdy=p.cy-my; if(cdx*cdx+cdy*cdy<900){ p.coin=false; p.coinTaken=true; combo=Math.min(8,combo+1); score+=combo; sCoin(); haptic('light'); for(let i=0;i<8;i++) parts.push({x:p.x+PIPEW/2,y:p.cy,vx:(Math.random()-.5)*220,vy:(Math.random()-.5)*220,life:.45,c:'#ffcf4d',s:2.5}); } }
  }
  if(pipes.length && pipes[0].x<-PIPEW-20) pipes.shift();
  spawnX-=sp*dt; if(spawnX< W- (W*0.40)){ addPipe(W+40); spawnX=W+40; }

  const msH=Math.min(W,H)*0.155;     // mascot draw height
  const R=msH*0.30;                   // pipe hit radius (forgiving)
  const cap=msH*0.42;                 // ceiling/floor margin (a bit > visible half)
  for(const p of pipes){ if(mx+R> p.x && mx-R< p.x+PIPEW){ if(my-R< p.top || my+R> p.bot){ over(); } } }
  if(my-cap<0){ my=cap; over(); }                 // clamp so the beanie never leaves the top
  if(my+cap>H-60){ my=H-60-cap; over(); }
}

function neonRect(x,y,w,h,col){ ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=16; ctx.fillStyle='rgba(8,12,18,0.92)'; ctx.fillRect(x,y,w,h); ctx.shadowBlur=0; ctx.strokeStyle=col; ctx.lineWidth=3; ctx.strokeRect(x+1.5,y+1.5,w-3,h-3); ctx.restore(); }
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.fillStyle='#080a12'; ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0f1f'); g.addColorStop(1,'#0a0712'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const sx=(shake?(Math.random()-.5)*shake:0), sy=(shake?(Math.random()-.5)*shake:0);
  ctx.save(); ctx.translate(sx,sy);
  for(const s of stars){ ctx.globalAlpha=s.z; ctx.fillStyle=s.c; ctx.fillRect(s.x,s.y,2*s.z+1,2*s.z+1); } ctx.globalAlpha=1;
  // skyline
  for(const b of skyline){ ctx.fillStyle='#0c1320'; ctx.fillRect(b.x,H-60-b.h,b.w,b.h); ctx.fillStyle=b.c; ctx.globalAlpha=.6; ctx.fillRect(b.x,H-60-b.h,b.w,3); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,255,255,.05)'; for(let wy=0;wy<b.h-14;wy+=14) for(let wx=4;wx<b.w-6;wx+=12) if(Math.random()<0.5||true) ctx.fillRect(b.x+wx,H-54-b.h+wy,5,6); }
  ctx.fillStyle='#0b1018'; ctx.fillRect(0,H-60,W,60); ctx.strokeStyle='#16ff9b'; ctx.globalAlpha=.4; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,H-60); ctx.lineTo(W,H-60); ctx.stroke(); ctx.globalAlpha=1;
  // pipes (candles)
  for(const p of pipes){ neonRect(p.x,0,PIPEW,p.top,'#ff3b5c'); ctx.strokeStyle='#ff3b5c'; ctx.globalAlpha=.5; ctx.beginPath(); ctx.moveTo(p.x+PIPEW/2,p.top-8); ctx.lineTo(p.x+PIPEW/2,p.top); ctx.stroke();
    neonRect(p.x,p.bot,PIPEW,H-60-p.bot,'#16ff9b'); ctx.beginPath(); ctx.moveTo(p.x+PIPEW/2,p.bot); ctx.lineTo(p.x+PIPEW/2,p.bot+8); ctx.strokeStyle='#16ff9b'; ctx.stroke(); ctx.globalAlpha=1;
    if(p.coin){ const yy=p.cy+Math.sin(performance.now()/250+p.x)*4; ctx.save(); ctx.shadowColor='#ffcf4d'; ctx.shadowBlur=14; ctx.fillStyle='#ffcf4d'; ctx.beginPath(); ctx.ellipse(p.x+PIPEW/2,yy,9,11,0,0,6.283); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#7a5200'; ctx.font='bold 13px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',p.x+PIPEW/2,yy+1); ctx.restore(); } }
  // trail
  for(const t of trail){ if(t.life<=0)continue; ctx.globalAlpha=t.life*0.45; ctx.fillStyle='#16ff9b'; const s=2+t.life*5; ctx.fillRect(t.x-s/2,t.y-s/2,s,s); } ctx.globalAlpha=1;
  // particles
  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life*2.2); ctx.fillStyle=p.c; ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s); } ctx.globalAlpha=1;
  // mascot
  const ms=Math.min(W,H)*0.155; const mw=ms*(mascot.width/mascot.height);
  ctx.save(); ctx.translate(mx,my); ctx.rotate(tilt*0.5);
  if(flap>0){ ctx.globalAlpha=flap; ctx.fillStyle='#16ff9b'; ctx.beginPath(); ctx.moveTo(-mw*0.3,ms*0.4); ctx.lineTo(mw*0.1,ms*0.4); ctx.lineTo(-mw*0.1,ms*0.4+18+Math.random()*10); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; }
  ctx.drawImage(mascot,-mw/2,-ms/2,mw,ms); ctx.restore();
  ctx.restore();

  // ---- UI ----
  if(state===ST.PLAY){ ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 52px monospace'; ctx.shadowColor='#16ff9b'; ctx.shadowBlur=14; ctx.fillText(String(score),W/2,80); ctx.shadowBlur=0;
    if(combo>1){ ctx.fillStyle='#ffcf4d'; ctx.font='bold 18px monospace'; ctx.fillText('COMBO x'+combo,W/2,108); } }
  if(state===ST.READY){ overlay();
    ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 34px monospace'; ctx.shadowColor='#16ff9b'; ctx.shadowBlur=18; ctx.fillText('CANDLE FLAP',W/2,H*0.30); ctx.shadowBlur=0;
    ctx.fillStyle='#16ff9b'; ctx.font='12px monospace'; ctx.fillText(CFG.TOKEN,W/2,H*0.30+24);
    ctx.fillStyle='#ffcf4d'; ctx.font='bold 13px monospace'; ctx.fillText('— HOW TO PLAY —',W/2,H*0.44);
    ctx.fillStyle='#cfe9da'; ctx.font='13px monospace';
    const L=['TAP / SPACE to flap up','Fly through the candle gaps','Grab $ in the gap = combo xN',"don't get liquidated"];
    for(let i=0;i<L.length;i++) ctx.fillText(L[i],W/2,H*0.44+30+i*26);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.fillText('▶  TAP TO START',W/2,H*0.72); ctx.globalAlpha=1;
    if(best>0){ ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('BEST  '+best,W/2,H*0.72+26); } }
  if(state===ST.OVER){ overlay(); ctx.textAlign='center';
    ctx.fillStyle='#ff3b5c'; ctx.font='bold 38px monospace'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=16; ctx.fillText('LIQUIDATED',W/2,H*0.34); ctx.shadowBlur=0;
    ctx.fillStyle='#5a7180'; ctx.font='12px monospace'; ctx.fillText('SCORE',W/2,H*0.42);
    ctx.fillStyle='#fff'; ctx.font='bold 60px monospace'; ctx.fillText(String(score),W/2,H*0.50);
    const nb=score>=best&&score>0; ctx.fillStyle=nb?'#16ff9b':'#5a7180'; ctx.font='bold 13px monospace'; ctx.fillText(nb?'★ NEW BEST ★':('BEST  '+best),W/2,H*0.55);
    const a=0.5+Math.sin(performance.now()/250)*0.5; ctx.globalAlpha=a; ctx.fillStyle='#fff'; ctx.font='bold 15px monospace'; ctx.fillText('↻  TAP TO RETRY',W/2,H*0.63); ctx.globalAlpha=1; }
}
function overlay(){ ctx.fillStyle='rgba(5,6,12,0.72)'; ctx.fillRect(0,0,W,H); }
function loop(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05; if(hitstop>0){hitstop-=dt;}else{update(dt);} draw(); requestAnimationFrame(loop); }
function boot(){ document.getElementById('load').style.display='none'; mx=W*0.30; my=H*0.45; initBg(); last=performance.now(); requestAnimationFrame(loop); }
</script>
</body>
</html>
